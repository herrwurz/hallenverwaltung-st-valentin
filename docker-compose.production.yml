services:
  db:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:?POSTGRES_DB is required}
      POSTGRES_USER: ${POSTGRES_USER:?POSTGRES_USER is required}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - internal

  migrate:
    build:
      context: .
      target: builder
    restart: "no"
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}?schema=public
    depends_on:
      db:
        condition: service_healthy
    command: ["npm", "run", "db:deploy"]
    networks:
      - internal

  web:
    build:
      context: .
      target: runner
    restart: unless-stopped
    environment:
      APP_ENV: ${APP_ENV:?APP_ENV is required}
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}?schema=public
      AUTH_SECRET: ${AUTH_SECRET:?AUTH_SECRET is required}
      AUTH_TRUST_HOST: ${AUTH_TRUST_HOST:-true}
      AUTH_URL: ${AUTH_URL:?AUTH_URL is required}
      PUBLIC_BASE_URL: ${PUBLIC_BASE_URL:?PUBLIC_BASE_URL is required}
      PUBLIC_AREA_ENABLED: ${PUBLIC_AREA_ENABLED:-false}
      MAIL_DELIVERY_MODE: ${MAIL_DELIVERY_MODE:-smtp}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_SECURE: ${SMTP_SECURE:-false}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_FROM_EMAIL: ${SMTP_FROM_EMAIL:-}
      SMTP_FROM_NAME: ${SMTP_FROM_NAME:-Hallenverwaltung St. Valentin}
    depends_on:
      migrate:
        condition: service_completed_successfully
    networks:
      - internal
      - proxy

  worker:
    build:
      context: .
      target: worker
    restart: unless-stopped
    environment:
      APP_ENV: ${APP_ENV:?APP_ENV is required}
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}?schema=public
      AUTH_SECRET: ${AUTH_SECRET:?AUTH_SECRET is required}
      WORKER_INTERVAL_SECONDS: ${WORKER_INTERVAL_SECONDS:-300}
      PUBLIC_BASE_URL: ${PUBLIC_BASE_URL:?PUBLIC_BASE_URL is required}
      MAIL_DELIVERY_MODE: ${MAIL_DELIVERY_MODE:-smtp}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_SECURE: ${SMTP_SECURE:-false}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_FROM_EMAIL: ${SMTP_FROM_EMAIL:-}
      SMTP_FROM_NAME: ${SMTP_FROM_NAME:-Hallenverwaltung St. Valentin}
    depends_on:
      migrate:
        condition: service_completed_successfully
    command:
      [
        "sh",
        "-c",
        "while true; do npm run worker:run; sleep $${WORKER_INTERVAL_SECONDS}; done",
      ]
    networks:
      - internal

  reverse-proxy:
    image: nginx:1.27-alpine
    restart: unless-stopped
    environment:
      SERVER_NAME: ${SERVER_NAME:?SERVER_NAME is required}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/nginx/templates:/etc/nginx/templates:ro
      - ${TLS_CERT_DIR:-./deploy/certs}:/etc/nginx/certs:ro
    depends_on:
      - web
    networks:
      - proxy

volumes:
  postgres_data:

networks:
  internal:
    internal: true
  proxy:
